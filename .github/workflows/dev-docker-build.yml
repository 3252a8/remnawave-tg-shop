name: Build and Push Dev GHCR Image

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

env:
  GHCR_ORG: ghcr.io/3252a8

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: bot
            image_name: remnawave-tg-shop
            context: .
            dockerfile: ./Dockerfile
          - name: web
            image_name: remnawave-tg-shop-web
            context: ./web
            dockerfile: ./web/Dockerfile

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Extract metadata (tags, labels) for Docker (${{ matrix.name }})
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ env.GHCR_ORG }}/${{ matrix.image_name }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
        flavor: |
          latest=false

    - name: Build and push Docker image (${{ matrix.name }})
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.context }}
        file: ${{ matrix.dockerfile }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Image digest
      run: echo ${{ steps.meta.outputs.digest }}
